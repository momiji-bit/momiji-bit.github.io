<script>
    $(document).ready(function () {
        var totalCitationElement = document.getElementById('total_cit');
        var citationElements = document.getElementsByClassName('show_paper_citations');

        if (!totalCitationElement && citationElements.length === 0) {
            return;
        }

        {% if site.google_scholar_stats_use_cdn %}
        var gsDataBaseUrl = 'https://cdn.jsdelivr.net/gh/{{ site.repository }}@';
        {% else %}
        var gsDataBaseUrl = 'https://raw.githubusercontent.com/{{ site.repository }}/';
        {% endif %}

        $.getJSON(gsDataBaseUrl + "google-scholar-stats/gs_data.json", function (data) {
            if (totalCitationElement && data && data.citedby !== undefined) {
                totalCitationElement.textContent = data.citedby;
            }

            Array.prototype.forEach.call(citationElements, function (element) {
                var paperId = element.getAttribute('data');
                var publication = data && data.publications && data.publications[paperId];

                if (publication && publication.num_citations !== undefined) {
                    element.textContent = '| Citations: ' + publication.num_citations;
                }
            });
        });
    })
</script>
